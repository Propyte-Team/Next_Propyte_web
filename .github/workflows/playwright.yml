name: Playwright

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  e2e-smoke:
    name: e2e smoke (@smoke tag)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Cache key tracks the Playwright version so a bump invalidates.
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        # Mobile project uses Pixel 5 emulation on chromium too — no separate browser needed.
        run: npx playwright install --with-deps chromium

      - name: Build (production-ish smoke)
        # Smoke tests run against `next dev` (started by playwright.config.ts)
        # so we don't need a build step here. Skipped to keep CI under 10 min.
        run: echo "Smoke runs against next dev, no build required"

      - name: Run Playwright @smoke
        env:
          # Test runs against the dev server; Supabase may be unreachable
          # in CI without secrets, in which case getDevelopments() falls
          # back gracefully and tests verify the empty-state path.
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: npm run test:e2e:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
