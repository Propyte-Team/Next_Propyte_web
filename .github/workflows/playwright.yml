name: Playwright

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  e2e-smoke:
    name: e2e smoke (@smoke tag)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Resolve Playwright version
        id: pw
        # Pin cache to the exact Playwright version installed by npm so the
        # browser bundle gets refreshed whenever @playwright/test bumps.
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}-
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        # Mobile project uses Pixel 5 emulation on chromium too — no separate browser needed.
        run: npx playwright install --with-deps chromium

      - name: Build (production-ish smoke)
        # Smoke tests run against `next dev` (started by playwright.config.ts)
        # so we don't need a build step here. Skipped to keep CI under 10 min.
        run: echo "Smoke runs against next dev, no build required"

      - name: Run Playwright @smoke
        env:
          # Test runs against the dev server; Supabase may be unreachable
          # in CI without secrets, in which case getDevelopments() falls
          # back gracefully and tests verify the empty-state path.
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: npm run test:e2e:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
